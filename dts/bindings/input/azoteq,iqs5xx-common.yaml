properties:
  rdy-gpios:
    type: phandle-array
    description: "Data Ready pin for the Azoteq IQS5xx trackpad"
  
  reset-gpios:
    type: phandle-array
    description: "Reset pin for the Azoteq IQS5xx trackpad"

  one-finger-tap:
    type: boolean
    description: "Register single finger tap gestures and report them as a left click"

  press-and-hold:
    type: boolean
    description: "Register press and hold gestures and report them as a left click until released"
  
  press-and-hold-time:
    type: int
    description: "Time in ms (in addition to the tap time) it takes to register a press and hold gesture"
    default: 250

  two-finger-tap:
    type: boolean
    description: "Register two finger tap gestures and report them as a right click"

  zoom:
    type: boolean
    description: |
      Register two-finger zoom (pinch/expand) gestures and report the signed
      magnitude on the INPUT_REL_MISC relative code (positive = expand/zoom in,
      negative = pinch/zoom out). Map it to Ctrl+scroll on the host with a
      zmk,input-processor-behaviors processor.

  drag-requires-double-tap:
    type: boolean
    description: |
      When set, a press-and-hold only latches a drag (held left button) if it
      begins within 'double-tap-time' ms of a single tap (macOS-style
      double-tap-and-drag). A bare press-and-hold then just moves the cursor.

  double-tap-time:
    type: int
    description: |
      Max ms gap between the single tap and the second touch landing for
      drag-requires-double-tap. The driver adds press-and-hold-time internally
      (the chip only raises the hold after that delay), so the effective
      tap->drag window is double-tap-time + press-and-hold-time.
    default: 400

  scroll:
    type: boolean
    description: "Register and report scroll gestures, both vertical and horizontal scroll is supported"

  natural-scroll-x:
    type: boolean
    description: "Whether content should track finger movement when scrolling on the x axis."

  natural-scroll-y:
    type: boolean
    description: "Whether content should track finger movement when scrolling on the y axis."

  switch-xy:
    type: boolean
    description: "Flip x and y axes"
  
  flip-x:
    type: boolean
    description: "Invert the direction of the x axis"

  flip-y:
    type: boolean
    description: "Invert the direction of the y axis"

  bottom-beta:
    type: int
    description: |
      Amount of filtering applied at slow speeds.
      0: Most filtering, smoother, but laggier.
      255: Least filtering, least smooth, more responsive.
    default: 5
  
  stationary-threshold:
    type: int
    description: |
      How far a finger must move (in pixels) to not be considered stationary.
    default: 5
